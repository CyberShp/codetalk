services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codetalks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-codetalks}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codetalks}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./.repos:/data/repos
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/project:rw
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-codetalks}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-codetalks}
      REPOS_BASE_PATH: ${REPOS_BASE_PATH:-/data/repos}

  deepwiki:
    image: ghcr.io/asyncfuncai/deepwiki-open:latest
    ports:
      - "8001:8001"
      - "3001:3000"
    volumes:
      - deepwiki_data:/root/.adalflow
      - ./.repos:/data/repos:ro
      - ./docker/deepwiki/embedder.json:/app/api/config/embedder.json:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPWIKI_EMBEDDING_BASE_URL: ${DEEPWIKI_EMBEDDING_BASE_URL:-}
      DEEPWIKI_EMBEDDING_API_KEY: ${DEEPWIKI_EMBEDDING_API_KEY:-${OPENAI_API_KEY:-}}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEEPWIKI_EMBEDDER_TYPE: ${DEEPWIKI_EMBEDDER_TYPE:-openai}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}

  gitnexus:
    build: ./docker/gitnexus
    ports:
      - "7100:7100"
    volumes:
      - gitnexus_data:/root/.gitnexus
      - ./.repos:/data/repos

  joern:
    image: ghcr.io/joernio/joern:latest
    ports:
      - "8080:8080"
    volumes:
      - ./.repos:/data/repos:ro
      - joern_data:/root/.joern
    command: ["joern", "--server", "--server-host", "0.0.0.0", "--server-port", "8080"]
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  semgrep:
    build: ./docker/semgrep
    ports:
      - "9090:9090"
    volumes:
      - ./.repos:/data/repos:ro
      - ./docker/semgrep/rules:/rules:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  zoekt:
    image: ghcr.io/sourcegraph/zoekt:latest
    platform: linux/amd64
    ports:
      - "6070:6070"
    volumes:
      - zoekt_index:/data/index
      - ./.repos:/data/repos:ro
    entrypoint: ["zoekt-webserver"]
    command: ["-index", "/data/index", "-listen", ":6070", "-rpc"]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6070/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pg_data:
  deepwiki_data:
  gitnexus_data:
  zoekt_index:
  joern_data:
