services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codetalks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-codetalks}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codetalks}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./.repos:/data/repos
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - .:/project:rw
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-codetalks}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-codetalks}
      REPOS_BASE_PATH: ${REPOS_BASE_PATH:-/data/repos}
      # Local tool (still in this compose)
      ZOEKT_BASE_URL: http://zoekt:6070
      # Remote tools on Windows (192.168.50.195)
      DEEPWIKI_BASE_URL: http://192.168.50.195:18001
      GITNEXUS_BASE_URL: http://192.168.50.195:7100
      JOERN_BASE_URL: http://192.168.50.195:8080
      CODECOMPASS_BASE_URL: http://192.168.50.195:6251

  # --- deepwiki, gitnexus, joern, codecompass moved to Windows ---
  # See deploy/windows/docker-compose.yml
  # Windows IP: 192.168.50.195

  zoekt:
    image: ghcr.io/sourcegraph/zoekt:latest
    platform: linux/amd64
    ports:
      - "6070:6070"
    volumes:
      - zoekt_index:/data/index
      - ./.repos:/data/repos:ro
    entrypoint: ["zoekt-webserver"]
    command: ["-index", "/data/index", "-listen", ":6070", "-rpc"]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6070/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  pg_data:
  zoekt_index:
