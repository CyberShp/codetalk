<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeTalk 控制中心</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <link rel="stylesheet" href="style.css?v=20260701" />
  <style>
    html, body { overflow: auto; }

    .launcher {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
      position: relative;
      z-index: 1;
    }

    .launcher-header {
      text-align: center;
      margin-bottom: 64px;
      animation: step-fade-in 0.18s ease-out forwards;
    }

    .launcher-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .launcher-logo .logo-icon {
      width: 48px;
      height: 48px;
    }

    .launcher-logo .logo-text {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .launcher-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .launcher-subtitle {
      font-size: 1.15rem;
      color: var(--text-secondary);
      max-width: 500px;
      margin: 0 auto;
    }

    .launcher-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
      max-width: 800px;
      width: 100%;
      animation: step-fade-in 0.18s ease-out 0.04s both;
    }

    .launcher-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }

    .launcher-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .launcher-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255,255,255,0.2);
      box-shadow:
        0 18px 36px rgba(15, 23, 42, 0.12);
    }

    .launcher-card:hover::before {
      opacity: 1;
    }

    .launcher-card:hover .card-icon-wrap {
      transform: scale(1.08);
    }

    .card-icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      transition: all var(--transition);
      position: relative;
      z-index: 1;
    }

    .card-icon-deploy {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.15), rgba(192, 132, 252, 0.15));
      border: 1px solid rgba(34, 211, 238, 0.25);
    }

    .card-icon-start {
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.15), rgba(34, 211, 238, 0.15));
      border: 1px solid rgba(74, 222, 128, 0.25);
    }

    .launcher-card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      position: relative;
      z-index: 1;
    }

    .launcher-card-desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.6;
      position: relative;
      z-index: 1;
    }

    .card-arrow {
      width: 24px;
      height: 24px;
      color: var(--text-muted);
      transition: all var(--transition);
      position: relative;
      z-index: 1;
    }

    .launcher-card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    .launcher-footer {
      margin-top: 64px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      animation: step-fade-in 0.18s ease-out 0.08s both;
    }

    .launcher-footer code {
      font-family: var(--font-mono);
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .launcher-cards {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .launcher-title {
        font-size: 2rem;
      }
      .launcher-card {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <!-- Static background -->
  <div class="nebula-container" aria-hidden="true">
    <div class="nebula-grid"></div>
  </div>

  <div class="launcher">
    <div class="launcher-header">
      <div class="launcher-logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M16 3C16 3 22 8 22 16C22 20.4 19.8 23.8 17 25.8L16 26.5L15 25.8C12.2 23.8 10 20.4 10 16C10 8 16 3 16 3Z" fill="var(--accent)" opacity="0.9"/>
          <path d="M16 26.5L14 30H18L16 26.5Z" fill="var(--accent)" opacity="0.7"/>
          <circle cx="16" cy="15" r="3" fill="var(--bg-space)"/>
        </svg>
        <span class="logo-text">CodeTalk <span class="logo-sub">控制中心</span></span>
      </div>
      <h1 class="launcher-title">CodeTalk 控制中心</h1>
      <p class="launcher-subtitle">部署、配置与管理您的 CodeTalk 实例</p>
    </div>

    <div class="launcher-cards">
      <a href="/deploy.html" class="launcher-card">
        <div class="card-icon-wrap card-icon-deploy">
          <span aria-hidden="true">&#x1F680;</span>
        </div>
        <h2 class="launcher-card-title">部署 CodeTalk</h2>
        <p class="launcher-card-desc">首次部署或重新配置<br />环境检查、参数设置、一键安装</p>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
      <a href="/start.html" class="launcher-card">
        <div class="card-icon-wrap card-icon-start">
          <span aria-hidden="true">&#x25B6;&#xFE0F;</span>
        </div>
        <h2 class="launcher-card-title">启动 CodeTalk</h2>
        <p class="launcher-card-desc">启动已部署的服务<br />服务监控、日志查看、一键启停</p>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

    <div class="launcher-footer">
      <p>CodeTalk Deployer &mdash; 部署服务运行于 <code>localhost:9000</code></p>
    </div>
  </div>
</body>
</html>
