# CodeTalks Remote Tools — Windows Host
# Only the 4 heavy analysis tools. Mac runs frontend/backend/postgres/zoekt.
#
# Usage:
#   1. Copy this entire "windows" folder to Windows SSD (e.g. D:\codetalk-tools\)
#   2. Copy project's docker/codecompass/ and docker/gitnexus/ and docker/deepwiki/
#      into the "docker/" subfolder alongside this file
#   3. Put analyzed repos into ./repos/ (or sync from Mac)
#   4. docker compose up -d

services:
  deepwiki:
    image: ghcr.io/asyncfuncai/deepwiki-open:latest
    ports:
      - "8001:8001"
      - "3001:3000"
    volumes:
      - deepwiki_data:/root/.adalflow
      - ./repos:/data/repos:ro
      - ./docker/deepwiki/embedder.json:/app/api/config/embedder.json:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPWIKI_EMBEDDING_BASE_URL: ${DEEPWIKI_EMBEDDING_BASE_URL:-}
      DEEPWIKI_EMBEDDING_API_KEY: ${DEEPWIKI_EMBEDDING_API_KEY:-${OPENAI_API_KEY:-}}
      DEEPWIKI_EMBEDDER_TYPE: ${DEEPWIKI_EMBEDDER_TYPE:-openai}
    restart: unless-stopped

  gitnexus:
    build: ./docker/gitnexus
    ports:
      - "7100:7100"
    volumes:
      - gitnexus_data:/root/.gitnexus
      - ./repos:/data/repos
    restart: unless-stopped

  joern:
    image: ghcr.io/joernio/joern:nightly
    ports:
      - "8080:8080"
    volumes:
      - ./repos:/data/repos:ro
      - joern_data:/root/.joern
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx6g"
    command: ["joern", "--server", "--server-host", "0.0.0.0", "--server-port", "8080"]
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -X POST -H \"Content-Type: application/json\" -d \"{\\\"query\\\": \\\"version\\\"}\" http://localhost:8080/query-sync || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  codecompass:
    build: ./docker/codecompass
    ports:
      - "6251:6251"
    volumes:
      - ./repos:/data/repos:ro
      - codecompass_data:/data/workspaces
    environment:
      # Connect to Mac's PostgreSQL over LAN
      CC_DATABASE: "pgsql:host=${MAC_IP:-192.168.50.199};port=5433;user=codetalks;password=changeme;database=codetalks"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6251/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  deepwiki_data:
  gitnexus_data:
  joern_data:
  codecompass_data:
