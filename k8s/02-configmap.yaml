# =============================================================================
# ConfigMap — 非敏感配置
# 敏感值（密码、API Key、FERNET_KEY）放在 03-secret.yaml
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: codetalk-config
  namespace: codetalk
data:
  POSTGRES_USER: "codetalks"
  POSTGRES_DB: "codetalks"
  DATABASE_URL: "postgresql+asyncpg://codetalks:$(POSTGRES_PASSWORD)@postgres:5432/codetalks"
  REPOS_BASE_PATH: "/data/repos"
  # deepwiki embedding 配置（内网部署建议使用 Ollama）
  DEEPWIKI_EMBEDDER_TYPE: "openai"        # 改为 ollama 可用内网模型
  OLLAMA_BASE_URL: "http://ollama:11434"   # 若无 Ollama 则留空
  OLLAMA_HOST: "http://ollama:11434"
  # ── frontend 运行时 URL（部署时必须替换为实际内网地址） ──
  # 格式: http://<k8s-node-ip>:30800  （用户浏览器能访问到的后端地址）
  NEXT_PUBLIC_API_URL: "http://REPLACE_WITH_NODE_IP:30800"
  NEXT_PUBLIC_WS_URL: "ws://REPLACE_WITH_NODE_IP:30800"

---
# embedder.json 单独做 ConfigMap，方便热更新
apiVersion: v1
kind: ConfigMap
metadata:
  name: deepwiki-embedder-config
  namespace: codetalk
data:
  embedder.json: |
    {
      "embedder": {
        "client_class": "OpenAIClient",
        "batch_size": 500,
        "model_kwargs": {
          "model": "text-embedding-3-small",
          "dimensions": 256,
          "encoding_format": "float"
        },
        "initialize_kwargs": {
          "env_base_url_name": "DEEPWIKI_EMBEDDING_BASE_URL",
          "env_api_key_name": "DEEPWIKI_EMBEDDING_API_KEY"
        }
      },
      "embedder_ollama": {
        "client_class": "OllamaClient",
        "model_kwargs": {
          "model": "nomic-embed-text"
        }
      },
      "retriever": { "top_k": 20 },
      "text_splitter": {
        "split_by": "word",
        "chunk_size": 350,
        "chunk_overlap": 100
      }
    }
