# =============================================================================
# Secret — 敏感配置
# 部署前用 base64 编码替换占位符（不要提交真实值到 Git）
# 生成命令: echo -n "your-value" | base64
#
# 强烈建议: 生产环境使用 Sealed Secrets 或外部 Vault，不要明文存放此文件
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: codetalk-secret
  namespace: codetalk
type: Opaque
data:
  # echo -n "changeme" | base64 → Y2hhbmdlbWU=
  POSTGRES_PASSWORD: Y2hhbmdlbWU=

  # 生成: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())" | base64
  FERNET_KEY: REPLACE_WITH_BASE64_FERNET_KEY

  # LLM API Key（内网代理地址的 key，如无则留空: ""的base64 = ""）
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GOOGLE_API_KEY: ""

  # deepwiki embedding API key（与 OPENAI_API_KEY 相同时复制即可）
  DEEPWIKI_EMBEDDING_API_KEY: ""
